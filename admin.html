<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Polla – Time Café Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  main.admin-main { max-width: 480px; margin: 40px auto; padding: 0 16px 60px; }
  .admin-title { font-family:"Playfair Display",serif; color:var(--brown); text-align:center; margin-bottom:20px; }
</style>
</head>
<body>

<div class="contact-bar">
  <div class="contact-item"><a href="index.html" style="color:#f5efe6;">← Volver al menú</a></div>
</div>

<main class="admin-main">
  <h2 class="admin-title">🔐 Admin · Polla Mundial</h2>

  <!-- LOGIN -->
  <div class="polla-card" id="loginCard">
    <h3>Ingresar</h3>
    <label>Contraseña de administrador</label>
    <input type="password" id="adminPass" placeholder="••••••••">
    <button class="polla-btn" id="loginBtn" style="margin-top:14px;">Entrar</button>
    <p id="loginMsg" class="polla-msg"></p>
  </div>

  <!-- PANEL (oculto hasta login correcto) -->
  <div id="adminPanel" style="display:none;">

    <div class="polla-card">
      <h3>⚽ Ingresar resultado oficial</h3>
      <label>Marcador final</label>
      <div class="marcador-row">
        <div class="marcador-team">
          <span>Colombia</span>
          <input type="number" id="rColombia" min="0" max="20">
        </div>
        <span class="marcador-vs">VS</span>
        <div class="marcador-team">
          <span>RD Congo</span>
          <input type="number" id="rCongo" min="0" max="20">
        </div>
      </div>
      <label>Goleador (si lo hubo, escribe el nombre tal como aparece en el formulario)</label>
      <select id="rGoleador">
        <option value="">— No hubo goleador —</option>
        <optgroup label="🇨🇴 Colombia">
          <option>Camilo Vargas</option>
          <option>Álvaro Montero</option>
          <option>David Ospina</option>
          <option>Dávinson Sánchez</option>
          <option>Jhon Lucumí</option>
          <option>Yerry Mina</option>
          <option>Willer Ditta</option>
          <option>Daniel Muñoz</option>
          <option>Santiago Arias</option>
          <option>Johan Mojica</option>
          <option>Deiver Machado</option>
          <option>Richard Ríos</option>
          <option>Jefferson Lerma</option>
          <option>Kevin Castaño</option>
          <option>Juan Camilo Portilla</option>
          <option>Gustavo Puerta</option>
          <option>Jhon Arias</option>
          <option>Jorge Carrascal</option>
          <option>Juan Fernando Quintero</option>
          <option>James Rodríguez</option>
          <option>Jaminton Campaz</option>
          <option>Juan Camilo Hernández</option>
          <option>Luis Díaz</option>
          <option>Luis Suárez</option>
          <option>Carlos Andrés Gómez</option>
          <option>Jhon Córdoba</option>
        </optgroup>
        <optgroup label="🇨🇩 RD Congo">
          <option>Lionel Mpasi</option>
          <option>Timothy Fayulu</option>
          <option>Matthieu Epolo</option>
          <option>Aaron Wan-Bissaka</option>
          <option>Chancel Mbemba</option>
          <option>Gédéon Kalulu</option>
          <option>Arthur Masuaku</option>
          <option>Axel Tuanzebe</option>
          <option>Joris Kayembe</option>
          <option>Steve Kapuadi</option>
          <option>Dylan Batubinsika</option>
          <option>Charles Pickel</option>
          <option>Samuel Moutoussamy</option>
          <option>Edo Kayembe</option>
          <option>Ngal'ayel Mukau</option>
          <option>Nathanaël Mbuku</option>
          <option>Noah Sadiki</option>
          <option>Aaron Tshibola</option>
          <option>Brian Cipenga</option>
          <option>Gaël Kakuta</option>
          <option>Théo Bongonda</option>
          <option>Meschack Elia</option>
          <option>Yoane Wissa</option>
          <option>Fiston Mayele</option>
          <option>Cédric Bakambu</option>
          <option>Simon Banza</option>
        </optgroup>
      </select>
      <button class="polla-btn" id="guardarBtn">Guardar resultado y calcular ganadores</button>
      <p id="adminMsg" class="polla-msg"></p>
    </div>

    <div class="polla-card">
      <h3>🏆 Ranking actual</h3>
      <div id="pollaRanking"><p class="polla-msg">Sin resultado aún.</p></div>
    </div>

    <div class="polla-card">
      <h3>📋 Todos los pronósticos</h3>
      <div id="pollaLista"><p class="polla-msg">Cargando...</p></div>
    </div>

    <div class="polla-card">
      <h3>⚠️ Reiniciar polla</h3>
      <p class="polla-rules">Esto borra TODOS los pronósticos y el resultado. Úsalo solo para una nueva polla.</p>
      <button class="polla-btn" id="resetBtn" style="background:#b3261e;">Borrar todo</button>
    </div>
  </div>
</main>

<script>
const API_POLLA = "/api/polla";
let adminPassword = "";

document.getElementById("loginBtn").addEventListener("click", async () => {
  const pass = document.getElementById("adminPass").value;
  const msg = document.getElementById("loginMsg");
  msg.textContent = "Verificando...";
  msg.className = "polla-msg";
  try {
    const res = await fetch(API_POLLA, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "admin_login", password: pass }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Error");
    adminPassword = pass;
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    cargarAdmin();
  } catch (err) {
    msg.textContent = err.message;
    msg.className = "polla-msg error";
  }
});

document.getElementById("guardarBtn").addEventListener("click", async () => {
  const colombia = document.getElementById("rColombia").value;
  const congo = document.getElementById("rCongo").value;
  const goleador = document.getElementById("rGoleador").value.trim();
  const msg = document.getElementById("adminMsg");

  if (colombia === "" || congo === "") {
    msg.textContent = "Ingresa el marcador final.";
    msg.className = "polla-msg error";
    return;
  }

  msg.textContent = "Guardando...";
  msg.className = "polla-msg";
  try {
    const res = await fetch(API_POLLA, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "admin_set_resultado",
        password: adminPassword,
        colombia, congo, goleador,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Error");
    msg.textContent = "¡Resultado guardado! Ranking actualizado.";
    msg.className = "polla-msg success";
    cargarAdmin();
  } catch (err) {
    msg.textContent = "Error: " + err.message;
    msg.className = "polla-msg error";
  }
});

document.getElementById("resetBtn").addEventListener("click", async () => {
  if (!confirm("¿Seguro que quieres borrar todos los pronósticos y el resultado?")) return;
  try {
    await fetch(API_POLLA, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "admin_reset", password: adminPassword }),
    });
    cargarAdmin();
  } catch (err) {
    alert("Error al reiniciar: " + err.message);
  }
});

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

async function cargarAdmin() {
  const lista = document.getElementById("pollaLista");
  const ranking = document.getElementById("pollaRanking");
  try {
    const res = await fetch(API_POLLA);
    const data = await res.json();

    if (data.resultado) {
      document.getElementById("rColombia").value = data.resultado.colombia;
      document.getElementById("rCongo").value = data.resultado.congo;
      document.getElementById("rGoleador").value = data.resultado.goleador || "";
    }

    if (!data.entries || data.entries.length === 0) {
      lista.innerHTML = '<p class="polla-msg">Aún no hay pronósticos.</p>';
    } else {
      const orden = [...data.entries].sort((a, b) => (b.puntos || 0) - (a.puntos || 0));
      lista.innerHTML = orden.map((e) => `
        <div class="polla-entry">
          <div>
            <strong>${escapeHtml(e.nombre)}</strong>
            <span class="polla-pick">${e.colombia} - ${e.congo}${e.goleador ? " · ⚽ " + escapeHtml(e.goleador) : ""}</span>
          </div>
          ${data.resultado ? `<span class="polla-points">${e.puntos ?? 0} pts</span>` : ""}
        </div>`).join("");
    }

    if (data.resultado) {
      const podio = (titulo, arr, medalla) =>
        arr.length
          ? `<div class="podio-puesto">
              <span class="podio-medalla">${medalla} ${titulo}</span>
              ${arr.map((e) => `<div class="podio-nombre">${escapeHtml(e.nombre)} — ${e.puntos} pts</div>`).join("")}
            </div>`
          : "";
      ranking.innerHTML = podio("Primer puesto", data.primerPuesto, "🥇") + podio("Segundo puesto", data.segundoPuesto, "🥈");
    } else {
      ranking.innerHTML = '<p class="polla-msg">Sin resultado aún.</p>';
    }
  } catch (err) {
    lista.innerHTML = '<p class="polla-msg">Error al cargar.</p>';
  }
}
</script>
</body>
</html>
